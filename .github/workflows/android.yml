name: Android Release CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Android Build Tools
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;29.0.3"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Get Version Name
      id: get_version
      run: |
        VERSION_NAME=$(grep "versionName " app/build.gradle | sed -E 's/.*"([^"]+)".*/\1/')
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

    - name: Sign Release APK
      if: github.event_name == 'push' && env.HAS_SIGNING_KEY == 'true'
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        HAS_SIGNING_KEY: ${{ secrets.SIGNING_KEY != '' }}

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body: |
          This is an automated build.
          Version: ${{ steps.get_version.outputs.version }}
          Last updated: ${{ github.event.head_commit.timestamp }}
          Commit: ${{ github.sha }}
        files: |
          app/build/outputs/apk/release/*.apk
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
